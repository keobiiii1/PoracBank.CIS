<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Porac Bank</title>
    <base href="/" />

    <link rel="icon" type="image/png" href="favicon.png" />

    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="CIS.Client.styles.css" />

    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

    <script type="importmap"></script>
    <link rel="preload" id="webassembly" />

    <style>
        /* ── Reset ── */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* ── Full-screen splash ── */
        .pb-splash {
            position: fixed;
            inset: 0;
            background: linear-gradient(145deg, #f0f2f5 0%, #e8f5ee 50%, #e8f0fb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            z-index: 9999;
        }

        /* Decorative blobs */
        .pb-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(70px);
            opacity: 0.3;
            animation: pb-blob-drift 9s ease-in-out infinite alternate;
            pointer-events: none;
        }

        .pb-blob-green {
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, #00a859 0%, transparent 70%);
            top: -120px;
            left: -120px;
        }

        .pb-blob-blue {
            width: 380px;
            height: 380px;
            background: radial-gradient(circle, #0056b3 0%, transparent 70%);
            bottom: -100px;
            right: -100px;
            animation-delay: -4.5s;
        }

        @keyframes pb-blob-drift {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(28px, 18px) scale(1.1);
            }
        }

        /* ── Glass card ── */
        .pb-splash-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 48px 40px 40px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 8px 48px rgba(0, 0, 0, 0.09), 0 1px 0 rgba(255,255,255,0.8) inset;
        }

        /* ── Logo ── */
        .pb-splash-logo {
            height: 56px;
            width: auto;
            display: block;
            margin: 0 auto 8px;
        }

        /* ── Tagline ── */
        .pb-splash-tagline {
            font-size: 0.72rem;
            color: #64748b;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        /* ── Progress bar ── */
        .pb-bar-track {
            height: 5px;
            background: #e2e8f0;
            border-radius: 99px;
            overflow: hidden;
            margin-bottom: 14px;
        }

        .pb-bar-fill {
            height: 100%;
            width: 35%;
            border-radius: 99px;
            background: linear-gradient(90deg, #00a859, #0056b3);
            animation: pb-bar-slide 1.6s ease-in-out infinite;
            background-size: 200% 100%;
        }

        @keyframes pb-bar-slide {
            0% {
                margin-left: 0%;
                width: 30%;
            }

            50% {
                margin-left: 40%;
                width: 50%;
            }

            100% {
                margin-left: 70%;
                width: 30%;
            }
        }

        .pb-splash.pb-hiding {
            animation: pb-fade-out 0.5s ease forwards;
        }

        @keyframes pb-fade-out {
            to {
                opacity: 0;
                pointer-events: none;
            }
        }

        /* ── Status text ── */
        .pb-splash-status {
            font-size: 0.76rem;
            color: #94a3b8;
            letter-spacing: 0.2px;
            animation: pb-pulse 1.8s ease-in-out infinite;
        }

        @keyframes pb-pulse {
            0%, 100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        /* ── Error UI ── */
        #blazor-error-ui {
            display: none;
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            background: #fff;
            border: 1px solid #fca5a5;
            border-radius: 14px;
            padding: 14px 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.12);
            align-items: center;
            gap: 12px;
            font-size: 0.84rem;
            color: #dc2626;
            white-space: nowrap;
            max-width: calc(100vw - 32px);
        }

            #blazor-error-ui .reload {
                color: #0056b3;
                font-weight: 600;
                text-decoration: none;
                margin-left: 6px;
            }

                #blazor-error-ui .reload:hover {
                    text-decoration: underline;
                }

            #blazor-error-ui .dismiss {
                margin-left: 10px;
                cursor: pointer;
                color: #94a3b8;
                font-size: 0.9rem;
            }

        /* ── Mobile ── */
        @media (max-width: 480px) {
            .pb-splash-card {
                padding: 36px 24px 32px;
                border-radius: 20px;
                max-width: calc(100vw - 32px);
            }

            .pb-splash-logo {
                height: 46px;
            }
        }
    </style>
</head>

<body>

    <div id="app">
        <div class="pb-splash">
            <div class="pb-blob pb-blob-green"></div>
            <div class="pb-blob pb-blob-blue"></div>

            <div class="pb-splash-card">
                <img src="images/poracbank.png" alt="Porac Bank" class="pb-splash-logo" />
                <p class="pb-splash-tagline">Customer Information System</p>

                <div class="pb-bar-track">
                    <div class="pb-bar-fill"></div>
                </div>
                <p class="pb-splash-status" id="pb-status">Initializing…</p>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        ⚠️ An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="js/signature.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        // ── Service Worker ───────────────────────────────────────────
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('./service-worker.js');
            });
        }

        // ── Connectivity ─────────────────────────────────────────────
        window.connectivityStatus = {
            checkStatus: function () { return navigator.onLine; },
            registerHandler: function (dotnetHelper) {
                window.addEventListener('online', () => dotnetHelper.invokeMethodAsync('UpdateStatus', true));
                window.addEventListener('offline', () => dotnetHelper.invokeMethodAsync('UpdateStatus', false));
            }
        };

        // ── Splash: cycle status messages ────────────────────────────
        var msgs = [
            'Initializing…',
            'Loading modules…',
            'Setting up services…',
            'Almost ready…'
        ];
        var mi = 0;
        var statusEl = document.getElementById('pb-status');
        var msgTimer = setInterval(function () {
            mi = (mi + 1) % msgs.length;
            if (statusEl) statusEl.textContent = msgs[mi];
        }, 1800);

        // ── Splash: hide once Blazor mounts #app ─────────────────────
        var observer = new MutationObserver(function () {
            var app = document.getElementById('app');
            // Blazor replaces the splash div with its own content
            if (app && !app.querySelector('.pb-splash')) {
                clearInterval(msgTimer);
                observer.disconnect();
                return;
            }
            // Or: Blazor has rendered real content alongside the splash
            if (app && app.children.length > 1) {
                clearInterval(msgTimer);
                var splash = app.querySelector('.pb-splash');
                if (splash) {
                    splash.classList.add('pb-hiding');
                    setTimeout(function () { splash.remove(); }, 520);
                }
                observer.disconnect();
            }
        });
        observer.observe(document.getElementById('app'), { childList: true, subtree: true });
    </script>

</body>
</html>
